<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>blockdeck</title>
<style>
  :root {
    --bg: #0e1116; --card: #161b22; --line: #262d38;
    --text: #e8ecf2; --dim: #8b95a5;
    --accent: #4f9cf9; --green: #3fb96a; --amber: #d29a3a; --red: #e25c55;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    background-image: radial-gradient(1200px 400px at 50% -100px, #1a2230 0%, var(--bg) 70%);
  }
  .wrap { max-width: 920px; margin: 0 auto; padding: 28px 18px 40px; }

  header { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
  header svg.logo { width: 30px; height: 30px; color: var(--accent); }
  h1 { font-size: 24px; margin: 0; letter-spacing: -.02em; }
  .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--dim); }
  .dot.up { background: var(--green); box-shadow: 0 0 0 0 rgba(63,185,106,.5);
            animation: pulse 2.5s infinite; }
  .dot.down { background: var(--red); }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(63,185,106,.45); }
    70% { box-shadow: 0 0 0 9px rgba(63,185,106,0); }
    100% { box-shadow: 0 0 0 0 rgba(63,185,106,0); }
  }
  .sub { color: var(--dim); margin: 0 0 22px 42px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
          gap: 16px; }
  .card {
    background: linear-gradient(180deg, #181e27 0%, var(--card) 100%);
    border: 1px solid var(--line); border-radius: 14px; padding: 18px;
    box-shadow: 0 2px 10px rgba(0,0,0,.25);
  }
  .card h2 {
    display: flex; align-items: center; gap: 8px;
    font-size: 12.5px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--dim); margin: 0 0 12px; font-weight: 600;
  }
  .card h2 svg { width: 15px; height: 15px; }
  .big { font-size: 28px; font-weight: 650; letter-spacing: -.02em; }
  .muted { color: var(--dim); font-size: 13px; }

  ul { list-style: none; margin: 8px 0 0; padding: 0; }
  li { display: flex; align-items: center; gap: 8px;
       padding: 7px 0; border-bottom: 1px solid var(--line); }
  li:last-child { border-bottom: none; }
  li .grow { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis;
             white-space: nowrap; }
  #activity li svg { width: 15px; height: 15px; flex: none; }
  li a.dl {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--text); text-decoration: none;
  }
  li a.dl svg { width: 14px; height: 14px; color: var(--dim); flex: none; }
  li a.dl:hover, li a.dl:hover svg { color: var(--accent); }

  .seedrow { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
  .seedrow button.icon {
    background: none; border: none; padding: 2px; cursor: pointer;
    color: var(--dim); display: inline-flex;
  }
  .seedrow button.icon:hover { color: var(--accent); }
  .seedrow button.icon svg { width: 14px; height: 14px; }
  .seedrow { flex-wrap: wrap; }
  #chunkbase {
    display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
    color: var(--dim); text-decoration: none; font-size: 13px;
    border: 1px solid var(--line); border-radius: 20px; padding: 2px 10px;
    transition: color .12s, border-color .12s;
  }
  #chunkbase:hover { color: var(--accent); border-color: var(--accent); }
  #chunkbase svg { width: 13px; height: 13px; flex: none; }
  footer a {
    color: var(--dim); text-decoration: none;
    border-bottom: 1px dotted var(--dim);
  }
  footer a:hover { color: var(--accent); border-color: var(--accent); }
  footer {
    display: flex; align-items: center; justify-content: center; gap: 7px;
    margin-top: 34px; color: var(--dim); font-size: 13px;
  }
  footer svg { width: 15px; height: 15px; vertical-align: -3px; }

  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    color: var(--green); font-size: 11.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .06em;
    background: rgba(63,185,106,.12); border-radius: 20px; padding: 2px 9px;
  }
  .badge svg { width: 12px; height: 12px; }

  button {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--accent); color: #fff; border: 0; border-radius: 9px;
    padding: 9px 15px; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: filter .12s, transform .12s;
  }
  button:hover { filter: brightness(1.12); transform: translateY(-1px); }
  button:disabled { opacity: .45; cursor: wait; transform: none; }
  button svg { width: 16px; height: 16px; flex: none; }
  button.success { background: var(--green); }
  button.warn { background: var(--amber); }
  button.ghost, a.ghost {
    background: transparent; border: 1px solid var(--line); color: var(--text);
  }
  a.ghost {
    display: inline-flex; align-items: center; gap: 7px; border-radius: 9px;
    padding: 9px 15px; font-size: 14px; font-weight: 600; text-decoration: none;
    transition: border-color .12s, transform .12s;
  }
  a.ghost:hover { border-color: var(--accent); transform: translateY(-1px); }
  a.ghost svg { width: 16px; height: 16px; color: var(--accent); }
  button.mini { padding: 4px 11px; font-size: 12.5px; border-radius: 7px; gap: 5px; }
  button.mini svg { width: 13px; height: 13px; }

  .statline { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
  .statlabel { width: 34px; font-size: 13px; color: var(--dim); }
  .statval { font-size: 12.5px; color: var(--dim); min-width: 120px; text-align: right; }
  .bar { flex: 1; height: 6px; background: var(--line); border-radius: 4px; overflow: hidden; }
  .bar i { display: block; height: 100%; width: 0; border-radius: 4px;
           background: var(--accent); transition: width .6s, background .6s; }
  .bar i.hot { background: var(--red); }

  .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 22px; }
  .formrow { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
  input[type=text], .formrow input, .sayrow input {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 9px;
    padding: 9px 13px; font-size: 14px; outline: none;
    transition: border-color .12s;
  }
  input:focus { border-color: var(--accent); }
  .formrow input#newname { flex: 1; min-width: 160px; }
  .formrow input#newseed { width: 160px; }
  .sayrow { display: flex; gap: 10px; margin-top: 14px; }
  .sayrow input { flex: 1; }

  #toast {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--line);
    border-left: 3px solid var(--accent); color: var(--text);
    padding: 11px 20px; border-radius: 10px; max-width: 90vw;
    box-shadow: 0 6px 24px rgba(0,0,0,.4);
    opacity: 0; transition: opacity .25s; pointer-events: none;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      <path d="M3.27 6.96L12 12.01l8.73-5.05"/><path d="M12 22.08V12"/>
    </svg>
    <h1>blockdeck</h1>
    <span class="dot" id="dot"></span>
  </header>
  <p class="sub" id="sub">connecting…</p>

  <div class="sayrow" style="margin: 0 0 18px">
    <input id="saymsg" placeholder="Broadcast a message to players…"
           onkeydown="if(event.key==='Enter')sendSay()">
    <button onclick="sendSay()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 22-7z"/></svg>
      Say</button>
  </div>

  <div class="grid">
    <div class="card">
      <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Players</h2>
      <div class="big" id="playercount">–</div>
      <ul id="players"></ul>
    </div>

    <div class="card">
      <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.83z"/><circle cx="7" cy="7" r="1" fill="currentColor"/></svg>
        Version</h2>
      <div class="big" id="version">–</div>
      <div class="muted" id="uptime"></div>
      <div class="seedrow muted">seed: <span id="seed">–</span>
        <button class="icon" onclick="copySeed()" title="copy seed">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
        <a id="chunkbase" href="#" target="_blank" rel="noopener" title="open this seed in Chunkbase Seed Map" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Chunkbase</a>
      </div>
    </div>

    <div class="card">
      <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/></svg>
        Backups</h2>
      <div class="big" id="backupcount">–</div>
      <ul id="backups"></ul>
    </div>

    <div class="card">
      <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M9 1v3"/><path d="M15 1v3"/><path d="M9 20v3"/><path d="M15 20v3"/><path d="M20 9h3"/><path d="M20 14h3"/><path d="M1 9h3"/><path d="M1 14h3"/></svg>
        System</h2>
      <div class="statline"><span class="statlabel">CPU</span>
        <span class="bar"><i id="cpubar"></i></span><span class="statval" id="cputext">–</span></div>
      <div class="statline"><span class="statlabel">RAM</span>
        <span class="bar"><i id="rambar"></i></span><span class="statval" id="ramtext">–</span></div>
      <div class="statline"><span class="statlabel">Disk</span>
        <span class="bar"><i id="diskbar"></i></span><span class="statval" id="disktext">–</span></div>
      <div class="muted" id="srvstats" style="margin-top:8px"></div>
    </div>

    <div class="card" style="grid-column: 1 / -1">
      <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        Activity</h2>
      <ul id="activity"></ul>
    </div>

    <div class="card" style="grid-column: 1 / -1">
      <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        Worlds</h2>
      <ul id="worlds"></ul>
      <div style="margin-top:14px">
        <button class="ghost mini" id="worldtoggle" onclick="toggleWorldForm()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
          New / Import world</button>
      </div>
      <div class="formrow" id="worldform" style="display:none">
        <input id="newname" placeholder="New world name">
        <input id="newseed" placeholder="Seed (optional)">
        <button onclick="createWorld()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
          Create</button>
        <input type="file" id="upload" accept=".mcworld,.zip" style="display:none">
        <button class="ghost" onclick="$('upload').click()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
          Import .mcworld</button>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="success" onclick="act('/api/backup', null)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg>
      Backup now</button>
    <button onclick="act('/api/update', 'Check for updates now? Players get a 5-minute warning if one is found.')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
      Check for update</button>
    <button class="warn" onclick="act('/api/restart', 'Restart the server right now? Players will be disconnected without warning.')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><path d="M12 2v10"/></svg>
      Restart server</button>
    <button onclick="act('/api/render-map', null)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6l6-3 6 3 6-3v15l-6 3-6-3-6 3z"/><path d="M9 3v15"/><path d="M15 6v15"/></svg>
      Render map</button>
    <a id="maplink" class="ghost" href="/map/" target="_blank" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14L21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
      Open map <span class="muted" id="maptime"></span></a>
  </div>

  <footer>
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.55v-2.15c-3.2.7-3.87-1.36-3.87-1.36-.52-1.33-1.28-1.68-1.28-1.68-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.03 1.76 2.69 1.25 3.34.96.1-.74.4-1.25.73-1.54-2.55-.29-5.23-1.28-5.23-5.68 0-1.26.45-2.28 1.18-3.09-.12-.29-.51-1.46.11-3.05 0 0 .97-.31 3.17 1.18a11 11 0 0 1 5.78 0c2.2-1.49 3.17-1.18 3.17-1.18.62 1.59.23 2.76.11 3.05.74.81 1.18 1.83 1.18 3.09 0 4.41-2.69 5.38-5.25 5.66.41.36.78 1.06.78 2.14v3.17c0 .31.21.67.8.55A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5z"/></svg>
    <a href="https://github.com/firdausaris/blockdeck" target="_blank" rel="noopener">blockdeck</a>
    <span>·</span>
    <span>by <a href="https://github.com/firdausaris" target="_blank" rel="noopener">firdausaris</a></span>
  </footer>
</div>
<div id="toast"></div>

<script>
const $ = id => document.getElementById(id);

const ICON_DL = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>';
const ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
const ICON_PLAY = '<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M7 4l13 8-13 8z"/></svg>';
const EVENT_ICONS = {
  join: '<svg viewBox="0 0 24 24" fill="none" stroke="#3fb96a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/></svg>',
  leave: '<svg viewBox="0 0 24 24" fill="none" stroke="#8b95a5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>',
  death: '<svg viewBox="0 0 24 24" fill="none" stroke="#e25c55" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="12" r="1" fill="#e25c55"/><circle cx="15" cy="12" r="1" fill="#e25c55"/><path d="M8 20v2h8v-2"/><path d="M12.5 17l-.5-1-.5 1h1z"/><path d="M16 20a2 2 0 0 0 1.56-3.25 8 8 0 1 0-11.12 0A2 2 0 0 0 8 20"/></svg>',
  server: '<svg viewBox="0 0 24 24" fill="none" stroke="#4f9cf9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><path d="M12 2v10"/></svg>',
};

function toast(msg) {
  $('toast').textContent = msg;
  $('toast').classList.add('show');
  setTimeout(() => $('toast').classList.remove('show'), 4000);
}

function fmtAgo(iso) {
  const s = (Date.now() - new Date(iso)) / 1000;
  if (s < 90) return 'just now';
  if (s < 5400) return Math.round(s / 60) + ' min ago';
  if (s < 129600) return Math.round(s / 3600) + ' h ago';
  return Math.round(s / 86400) + ' days ago';
}

const esc = s => s.replace(/[&<>"]/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function refresh() {
  let st;
  try {
    st = await (await fetch('/api/status')).json();
  } catch {
    $('dot').className = 'dot down';
    $('sub').textContent = 'dashboard unreachable';
    return;
  }
  const up = st.container.state === 'running' && st.ping;
  $('dot').className = 'dot ' + (up ? 'up' : 'down');
  $('sub').textContent = (up
    ? `${st.ping.motd} — online`
    : `server ${st.container.state}`)
    + (st.auth ? '' : '  ⚠ no dashboard password set (DASH_PASSWORD in .env)');

  $('playercount').textContent = st.ping
    ? `${st.ping.players_online} / ${st.ping.players_max}` : '–';
  $('players').innerHTML = st.players.map(p =>
    `<li><span class="grow">${esc(p)}</span></li>`).join('')
    || '<li class="muted">nobody online</li>';

  $('version').textContent = st.installed_version || '–';
  $('uptime').textContent = st.container.started_at
    ? 'up since ' + fmtAgo(st.container.started_at).replace(' ago', '') : '';
  $('seed').textContent = st.seed || '–';
  if (st.seed) {
    $('chunkbase').href = 'https://www.chunkbase.com/apps/seed-map#' + st.seed;
    $('chunkbase').style.display = '';
  }

  if (st.map && st.map.rendered) {
    $('maplink').style.display = '';
    $('maptime').textContent = '· ' + fmtAgo(st.map.rendered_at);
  }

  const sys = st.system;
  if (sys) {
    setBar('cpubar', sys.cpu_percent);
    $('cputext').textContent = (sys.cpu_percent ?? '–') + `% · load ${sys.load} / ${sys.cpu_count}`;
    setBar('rambar', sys.mem_percent);
    $('ramtext').textContent = `${sys.mem_used} / ${sys.mem_total}`;
    setBar('diskbar', sys.disk_percent);
    $('disktext').textContent = `${sys.disk_used} / ${sys.disk_total}`;
  }
  $('srvstats').textContent = st.server_stats
    ? `bedrock process: ${st.server_stats.mem} RAM` +
      (st.server_stats.cpu_percent != null ? ` · ${st.server_stats.cpu_percent}% CPU` : '')
    : '';

  $('activity').innerHTML = (st.events || []).map(ev =>
    `<li>${EVENT_ICONS[ev.type] || ''}<span class="grow">${esc(ev.text)}</span>
     <span class="muted">${ev.time ? fmtAgo(ev.time) : ''}</span></li>`
  ).join('') || '<li class="muted">nothing yet — joins, leaves and restarts show up here</li>';

  $('backupcount').textContent = st.backups.count;
  $('backups').innerHTML = st.backups.recent.map(b =>
    `<li><a class="dl grow" href="/api/backups/${encodeURIComponent(b.name)}"
        download title="download ${esc(b.name)}">${ICON_DL}${fmtAgo(b.time)}</a>
        <span class="muted">${b.size}</span></li>`
  ).join('') || '<li class="muted">no backups yet</li>';

  $('worlds').innerHTML = st.worlds.map(w =>
    `<li><span class="grow">${esc(w.name)}</span>
     <span class="muted">${w.size}</span> ` +
    (w.active ? `<span class="badge">${ICON_CHECK}active</span>`
              : `<button class="mini ghost" data-world="${esc(w.name)}">${ICON_PLAY}Activate</button>`) +
    '</li>'
  ).join('') || '<li class="muted">no worlds yet</li>';
}

function setBar(id, pct) {
  const el = $(id);
  el.style.width = (pct ?? 0) + '%';
  el.classList.toggle('hot', (pct ?? 0) > 85);
}

function toggleWorldForm() {
  const f = $('worldform');
  const open = f.style.display === 'none';
  f.style.display = open ? '' : 'none';
  if (open) $('newname').focus();
}

async function act(url, confirmMsg) {
  if (confirmMsg && !confirm(confirmMsg)) return;
  document.querySelectorAll('button').forEach(b => b.disabled = true);
  try {
    const r = await fetch(url, { method: 'POST' });
    const body = await r.json();
    toast(body.message || body.detail || (r.ok ? 'done' : 'failed'));
  } catch (e) {
    toast('request failed: ' + e);
  } finally {
    document.querySelectorAll('button').forEach(b => b.disabled = false);
  }
}

$('worlds').addEventListener('click', e => {
  const btn = e.target.closest('[data-world]');
  if (!btn) return;
  actJson('/api/worlds/activate', { name: btn.dataset.world },
    `Switch the active world to "${btn.dataset.world}"? The server restarts and players are disconnected.`);
});

async function createWorld() {
  const name = $('newname').value.trim();
  if (!name) { toast('enter a world name'); return; }
  const seed = $('newseed').value.trim();
  await actJson('/api/worlds', { name, seed: seed || null },
    `Create new world "${name}"${seed ? ' with seed ' + seed : ''}? The server will restart.`);
  $('newname').value = ''; $('newseed').value = '';
  $('worldform').style.display = 'none';
}

$('upload').addEventListener('change', async () => {
  const file = $('upload').files[0];
  if (!file) return;
  if (!confirm(`Import "${file.name}" as a new world and switch to it?`)) return;
  toast('uploading and importing… this can take a minute');
  const fd = new FormData();
  fd.append('file', file);
  document.querySelectorAll('button').forEach(b => b.disabled = true);
  try {
    const r = await fetch('/api/worlds/import', { method: 'POST', body: fd });
    const body = await r.json();
    toast(body.message || body.detail || (r.ok ? 'imported' : 'failed'));
  } catch (e) {
    toast('import failed: ' + e);
  } finally {
    document.querySelectorAll('button').forEach(b => b.disabled = false);
    $('upload').value = '';
    refresh();
  }
});

async function actJson(url, payload, confirmMsg) {
  if (confirmMsg && !confirm(confirmMsg)) return;
  document.querySelectorAll('button').forEach(b => b.disabled = true);
  toast('working… the server is restarting');
  try {
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const body = await r.json();
    toast(body.message || body.detail || (r.ok ? 'done' : 'failed'));
  } catch (e) {
    toast('request failed: ' + e);
  } finally {
    document.querySelectorAll('button').forEach(b => b.disabled = false);
    refresh();
  }
}

function copySeed() {
  const s = $('seed').textContent;
  if (s && s !== '–') { navigator.clipboard.writeText(s); toast('seed copied'); }
}

async function sendSay() {
  const msg = $('saymsg').value.trim();
  if (!msg) return;
  const r = await fetch('/api/say', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: msg }),
  });
  if (r.ok) {
    $('saymsg').value = '';
    toast('sent');
  } else {
    toast('failed: ' + ((await r.json()).detail || r.status));
  }
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
