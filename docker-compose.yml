# Pin the compose project name so container/network names don't depend on
# whatever the checkout folder happens to be called
name: blockdeck

services:
  bedrock:
    image: itzg/minecraft-bedrock-server
    container_name: bedrock
    restart: unless-stopped
    # stdin/tty keep the server console available via `docker attach bedrock`
    stdin_open: true
    tty: true
    # Host networking so the server answers LAN discovery broadcasts and
    # shows up in the game's server list. Note this also puts the console
    # SSH (port 2222, password = RCON_PASSWORD) on the LAN.
    network_mode: host
    # send-command locates the (setuid-demoted) server process via /proc,
    # which needs ptrace-read — not in Docker's default capability set
    cap_add:
      - SYS_PTRACE
    environment:
      EULA: "${EULA:?Set EULA=TRUE in .env to accept the Minecraft EULA}"
      VERSION: "${VERSION:-LATEST}"
      SERVER_NAME: "${SERVER_NAME:-Bedrock Server}"
      LEVEL_NAME: "${LEVEL_NAME:-world}"
      GAMEMODE: "${GAMEMODE:-survival}"
      DIFFICULTY: "${DIFFICULTY:-normal}"
      MAX_PLAYERS: "${MAX_PLAYERS:-10}"
      ALLOW_CHEATS: "${ALLOW_CHEATS:-false}"
      ONLINE_MODE: "${ONLINE_MODE:-true}"
      ALLOW_LIST: "${ALLOW_LIST:-false}"
      ALLOW_LIST_USERS: "${ALLOW_LIST_USERS:-}"
      VIEW_DISTANCE: "${VIEW_DISTANCE:-32}"
      # Console-over-SSH on port 2222, reachable only from other containers
      # on the compose network (not published to the LAN). The backup
      # service uses it for save hold/resume.
      ENABLE_SSH: "true"
      RCON_PASSWORD: "${RCON_PASSWORD:?Set RCON_PASSWORD in .env (console password used by the backup service)}"
      SERVER_PORT: "${SERVER_PORT:-19132}"
      SERVER_PORT_V6: "${SERVER_PORT_V6:-19133}"
    volumes:
      - ./data:/data

  backup:
    image: kaiede/minecraft-bedrock-backup
    container_name: bedrock-backup
    restart: unless-stopped
    depends_on:
      - bedrock
    # The server runs with host networking, so reach its console via the
    # host gateway rather than a container name
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: "${TZ:-UTC}"
    volumes:
      - ./backups:/data
      - ./data:/server:ro
      - ./backup:/config

  # Checks Mojang for new Bedrock releases and restarts the server to
  # apply them (after warning the players in-game). Needs the docker
  # socket to exec/restart the server container.
  updater:
    build: ./updater
    container_name: bedrock-updater
    restart: unless-stopped
    depends_on:
      - bedrock
    environment:
      TZ: "${TZ:-UTC}"
      VERSION: "${VERSION:-LATEST}"
      UPDATE_CRON: "${UPDATE_CRON:-15 * * * *}"
      UPDATE_WARN_MINUTES: "${UPDATE_WARN_MINUTES:-5}"
    volumes:
      - ./data:/server:ro
      - /var/run/docker.sock:/var/run/docker.sock

  # Web dashboard: status, players, backups, update/restart controls.
  # LAN-only by design — don't port-forward this without adding auth.
  dashboard:
    build: ./dashboard
    container_name: bedrock-dashboard
    restart: unless-stopped
    depends_on:
      - bedrock
    ports:
      - "${DASH_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: "${TZ:-UTC}"
      LEVEL_NAME: "${LEVEL_NAME:-world}"
      SERVER_HOST: "host.docker.internal"
      SERVER_PORT: "${SERVER_PORT:-19132}"
    volumes:
      - ./data:/server:ro
      - ./backups:/backups:ro
      - ./backup:/backup-config:ro
      - ./map-data:/map-data:ro
      - /var/run/docker.sock:/var/run/docker.sock

  # Renders the world map (uNmINeD) from the newest backup snapshot.
  # Served by the dashboard at /map.
  map:
    build: ./map
    container_name: bedrock-map
    restart: unless-stopped
    environment:
      TZ: "${TZ:-UTC}"
      MAP_CRON: "${MAP_CRON:-30 4 * * *}"
    volumes:
      - ./backups:/backups:ro
      - ./map-data:/map

  # Off-site replication of ./backups via restic. Opt-in:
  # set COMPOSE_PROFILES=offsite in .env and configure RESTIC_* there.
  offsite:
    build: ./offsite
    container_name: bedrock-offsite
    restart: unless-stopped
    profiles: ["offsite"]
    environment:
      TZ: "${TZ:-UTC}"
      RESTIC_REPOSITORY: "${RESTIC_REPOSITORY:-}"
      RESTIC_PASSWORD: "${RESTIC_PASSWORD:-}"
      OFFSITE_CRON: "${OFFSITE_CRON:-30 3 * * *}"
      KEEP_DAILY: "${KEEP_DAILY:-7}"
      KEEP_WEEKLY: "${KEEP_WEEKLY:-4}"
      KEEP_MONTHLY: "${KEEP_MONTHLY:-6}"
    volumes:
      - ./backups:/backups:ro
      - ./offsite/ssh:/ssh:ro
      - restic-cache:/cache

volumes:
  restic-cache:
