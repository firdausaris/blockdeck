# Pin the compose project name so container/network names don't depend on
# whatever the checkout folder happens to be called
name: blockdeck

services:
  bedrock:
    image: itzg/minecraft-bedrock-server
    container_name: bedrock
    restart: unless-stopped
    # stdin/tty keep the server console available via `docker attach bedrock`
    stdin_open: true
    tty: true
    ports:
      - "${SERVER_PORT:-19132}:19132/udp"
      - "${SERVER_PORT_V6:-19133}:19133/udp"
    environment:
      EULA: "${EULA:?Set EULA=TRUE in .env to accept the Minecraft EULA}"
      VERSION: "${VERSION:-LATEST}"
      SERVER_NAME: "${SERVER_NAME:-Bedrock Server}"
      LEVEL_NAME: "${LEVEL_NAME:-world}"
      GAMEMODE: "${GAMEMODE:-survival}"
      DIFFICULTY: "${DIFFICULTY:-normal}"
      MAX_PLAYERS: "${MAX_PLAYERS:-10}"
      ALLOW_CHEATS: "${ALLOW_CHEATS:-false}"
      ONLINE_MODE: "${ONLINE_MODE:-true}"
      ALLOW_LIST: "${ALLOW_LIST:-false}"
      ALLOW_LIST_USERS: "${ALLOW_LIST_USERS:-}"
      VIEW_DISTANCE: "${VIEW_DISTANCE:-32}"
      # Console-over-SSH on port 2222, reachable only from other containers
      # on the compose network (not published to the LAN). The backup
      # service uses it for save hold/resume.
      ENABLE_SSH: "true"
      RCON_PASSWORD: "${RCON_PASSWORD:?Set RCON_PASSWORD in .env (console password used by the backup service)}"
    volumes:
      - ./data:/data

  backup:
    image: kaiede/minecraft-bedrock-backup
    container_name: bedrock-backup
    restart: unless-stopped
    depends_on:
      - bedrock
    environment:
      TZ: "${TZ:-UTC}"
    volumes:
      - ./backups:/data
      - ./data:/server:ro
      - ./backup:/config

  # Checks Mojang for new Bedrock releases and restarts the server to
  # apply them (after warning the players in-game). Needs the docker
  # socket to exec/restart the server container.
  updater:
    build: ./updater
    container_name: bedrock-updater
    restart: unless-stopped
    depends_on:
      - bedrock
    environment:
      TZ: "${TZ:-UTC}"
      VERSION: "${VERSION:-LATEST}"
      UPDATE_CRON: "${UPDATE_CRON:-15 * * * *}"
      UPDATE_WARN_MINUTES: "${UPDATE_WARN_MINUTES:-5}"
    volumes:
      - ./data:/server:ro
      - /var/run/docker.sock:/var/run/docker.sock

  # Off-site replication of ./backups via restic. Opt-in:
  # set COMPOSE_PROFILES=offsite in .env and configure RESTIC_* there.
  offsite:
    build: ./offsite
    container_name: bedrock-offsite
    restart: unless-stopped
    profiles: ["offsite"]
    environment:
      TZ: "${TZ:-UTC}"
      RESTIC_REPOSITORY: "${RESTIC_REPOSITORY:-}"
      RESTIC_PASSWORD: "${RESTIC_PASSWORD:-}"
      OFFSITE_CRON: "${OFFSITE_CRON:-30 3 * * *}"
      KEEP_DAILY: "${KEEP_DAILY:-7}"
      KEEP_WEEKLY: "${KEEP_WEEKLY:-4}"
      KEEP_MONTHLY: "${KEEP_MONTHLY:-6}"
    volumes:
      - ./backups:/backups:ro
      - ./offsite/ssh:/ssh:ro
      - restic-cache:/cache

volumes:
  restic-cache:
